name: Test

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: '6.2'

    - name: Run Tests
      run: swift test --enable-code-coverage

    - name: Export Coverage
      run: |
        # バイナリが配置されているディレクトリを取得
        BIN_PATH=$(swift build --show-bin-path)
        
        # Linuxではテストは .xctest バンドルではなく、単一の実行ファイルとして生成されます。
        # LZStringPackageTests という実行ファイルを検索してパスを特定します。
        TEST_BINARY=$(find "$BIN_PATH" -maxdepth 1 -type f -executable -name "LZStringPackageTests" | head -n 1)
        
        if [ -z "$TEST_BINARY" ]; then
          echo "Error: Test binary not found in $BIN_PATH"
          exit 1
        fi

        LLVM_COV="$(dirname "$(which swift)")/llvm-cov"
        
        # 特定した実行ファイルパスを使用してレポートを生成
        "$LLVM_COV" export -format="lcov" "$TEST_BINARY" -instr-profile="$BIN_PATH/codecov/default.profdata" > coverage.lcov
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.lcov
        fail_ci_if_error: true
        verbose: true

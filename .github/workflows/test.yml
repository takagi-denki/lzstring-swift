name: Test

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: '6.2'

    - name: Run Tests
      run: swift test --enable-code-coverage

    - name: Export Coverage
      run: |
        BIN_PATH=$(swift build --show-bin-path)
        XCTEST_PATH="$BIN_PATH/LZStringPackageTests.xctest/Contents/MacOS/LZStringPackageTests"        
        LLVM_COV="$(dirname "$(which swift)")/llvm-cov"        
        "$LLVM_COV" export -format="lcov" "$XCTEST_PATH" -instr-profile="$BIN_PATH/codecov/default.profdata" > coverage.lcov

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.lcov
        fail_ci_if_error: true
        verbose: true

name: Test

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: '6.2'

    - name: Run Tests
      run: swift test --enable-code-coverage

    - name: Export Coverage
      run: |
        BIN_PATH=$(swift build --show-bin-path)
        
        # ターゲット名（LZStringTests）に一致する実行ファイルを特定します。
        # パッケージ構成によっては 'LZStringPackageTests' の場合もあるため、
        # 'Tests' で終わる実行ファイルを動的に検索するのが最も確実です。
        TEST_BINARY=$(find "$BIN_PATH" -maxdepth 1 -type f -executable -name "*Tests" | head -n 1)
        
        if [ -z "$TEST_BINARY" ]; then
          echo "Error: Test binary not found in $BIN_PATH"
          # デバッグ用にディレクトリの中身を表示
          ls -l "$BIN_PATH"
          exit 1
        fi

        echo "Found test binary: $TEST_BINARY"

        LLVM_COV="$(dirname "$(which swift)")/llvm-cov"
        
        # カバレッジデータ (.profdata) のパスを確認
        PROFDATA="$BIN_PATH/codecov/default.profdata"
        if [ ! -f "$PROFDATA" ]; then
          PROFDATA=$(find "$BIN_PATH" -name "default.profdata" | head -n 1)
        fi
        
        "$LLVM_COV" export -format="lcov" "$TEST_BINARY" -instr-profile="$PROFDATA" > coverage.lcov
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.lcov
        fail_ci_if_error: true
        verbose: true

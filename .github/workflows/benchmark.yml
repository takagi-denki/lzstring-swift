name: Performance Benchmark

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'Sources/**'
      - 'Benchmarks/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjemalloc-dev

      - name: Checkout main branch
        run: git checkout main
        
      - name: Create baseline from main
        run: swift package --allow-writing-to-package-directory benchmark baseline update ci-baseline

      - name: Checkout PR branch
        run: git checkout ${{ github.head_ref }}

      - name: Check performance against baseline
        run: swift package --allow-writing-to-package-directory benchmark baseline check ci-baseline